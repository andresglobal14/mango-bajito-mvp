<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          var currentFetch = originalFetch;
          
          var descriptor = {
            get: function() {
              return currentFetch;
            },
            set: function(val) {
              currentFetch = val;
            },
            configurable: true,
            enumerable: true
          };

          Object.defineProperty(window, 'fetch', descriptor);
          
          if (typeof globalThis !== 'undefined') {
            try {
              Object.defineProperty(globalThis, 'fetch', descriptor);
            } catch (e1) {
              // Ignore sub-errors for globalThis if it's identical
            }
          }
        } catch (e) {
          console.warn('Sandbox warning: Safe fetch descriptor could not be fully defined', e);
        }
      })();
    </script>
    <title>Mango pero bien bajito</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
